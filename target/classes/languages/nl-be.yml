  max-accounts-reached: "&c&lAccountlimiet bereikt!\n&7Dit Discord-account heeft het maximum van &e{max} &7Minecraft-accounts bereikt.\n\n&7Gekoppelde accounts:\n{accounts}\n\n&7Ontkoppel een bestaand account met &e/discordauth unlink &7voordat je een nieuw account koppelt."
  kick-max-accounts: "Accountlimiet bereikt. Dit Discord-account heeft al {max} gekoppelde Minecraft-accounts. Ontkoppel er één voordat je een nieuw account koppelt."

# Discord DM berichten (verzonden via Discord bot)
# Beschikbare placeholders: {code}, {player}, {server}
discord:
  # Eerste verificatie embed (wanneer speler account voor het eerst koppelt)
  first-join-embed:
    color: 13224211
    title: "**`{code}`** is je verificatiecode voor **{server}**"
    description: |
      Dit discord account wordt gekoppeld aan {player}.
      
      **Voer de volgende code in-game in om verificatie te voltooien: `{code}`**
      meer informatie kan gevonden worden [hier (klik mij)](<https://thetwixhunter.nekoweb.org/discordauth/guides/verification.html>)
      
      ### Volgende stappen:
      - Stel een herstelwachtwoord in door `/pw set <wachtwoord> <bevestig_wachtwoord>` in-game uit te voeren om ervoor te zorgen dat je nooit je account verliest.
      _ _
      **❌ Was dit jij niet?** Voer `/unlink {player}` hieronder uit om dit account te ontkoppelen.
  
  # Reguliere verificatie embed (wanneer speler opnieuw verifieert vanaf nieuw IP)
  verification-embed:
    color: 64367
    title: "**`{code}`** is je verificatiecode voor **{server}**"
    description: |
      Deze code werd aangevraagd door {player}.
      
      Voer deze code in-game in om verificatie te voltooien, meer informatie kan gevonden worden [hier (klik mij)](<https://thetwixhunter.nekoweb.org/discordauth/guides/verification.html>).
      
      ﻿:x:﻿ **Was dit jij niet?** Voer `/unlink {player}` hieronder uit om dit account te ontkoppelen.
  
  # Wachtwoord reset embed (wanneer speler /password forgot gebruikt)
  password-reset-embed:
    color: 13440791
    title: "Wachtwoord reset - {server}"
    description: |
      Het back-up wachtwoord voor {player} is gereset.
      
      **Nieuw Tijdelijk Wachtwoord: `{password}`**
      
      **VOLGENDE STAPPEN:**
      • Je kunt dit wachtwoord gebruiken om in te loggen, voer het gewoon in bij de verificatie prompt.
      • **Verander het onmiddellijk!** met `/pw change <oud> <nieuw> <bevestig>`.
      
      **❌ Was dit jij niet?** Neem contact op met één van de server administrators!

